<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAA-C03 Complete Exam Memory Palace</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#06090f;--card:#0c1219;--hover:#111a24;--bdr:#1a2636;--bdr2:#243447;--t:#c8d6e5;--td:#6b7f95;--tb:#e8f0f8;--a:#f59e0b;--ad:#92610b;--ag:rgba(245,158,11,.12);--b:#3b82f6;--bd:#1e3a5f;--g:#22c55e;--r:#ef4444;--p:#a78bfa;--c:#22d3ee;--pk:#f472b6}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--t);line-height:1.65;-webkit-font-smoothing:antialiased}
::selection{background:var(--a);color:#000}
.hero{position:relative;padding:50px 24px 36px;text-align:center;border-bottom:1px solid var(--bdr);overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(245,158,11,.08),transparent),radial-gradient(ellipse 60% 50% at 80% 100%,rgba(59,130,246,.06),transparent)}
.hero h1{font-size:clamp(1.6rem,4vw,2.6rem);font-weight:800;color:#fff;position:relative}
.hero h1 span{color:var(--a)}
.hero p{color:var(--td);margin-top:8px;font-size:.9rem;position:relative}
.badge{display:inline-block;margin-top:10px;padding:4px 12px;background:var(--ag);border:1px solid var(--ad);border-radius:20px;font-size:.72rem;color:var(--a);font-family:'JetBrains Mono',monospace;position:relative}
.nav-w{position:sticky;top:0;z-index:200;background:rgba(6,9,15,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--bdr);padding:10px 16px}
.nav{display:flex;gap:5px;overflow-x:auto;max-width:1100px;margin:0 auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav button{flex-shrink:0;padding:5px 12px;border-radius:6px;border:1px solid var(--bdr);background:0;color:var(--td);font-family:'Plus Jakarta Sans',sans-serif;font-size:.72rem;font-weight:600;cursor:pointer;transition:.15s;white-space:nowrap}
.nav button:hover{border-color:var(--bdr2);color:var(--t)}
.nav button.on{background:var(--a);color:#000;border-color:var(--a);font-weight:700}
.search-w{max-width:1100px;margin:14px auto 0;padding:0 20px}
.search-w input{width:100%;padding:9px 14px;background:var(--card);border:1px solid var(--bdr);border-radius:8px;color:var(--tb);font-family:'Plus Jakarta Sans',sans-serif;font-size:.85rem;outline:0;transition:.2s}
.search-w input:focus{border-color:var(--a)}
.search-w input::placeholder{color:var(--td)}
.container{max-width:1100px;margin:0 auto;padding:18px}
.prog{margin-bottom:16px;padding:12px 16px;background:var(--card);border:1px solid var(--bdr);border-radius:10px;display:flex;align-items:center;gap:12px;font-size:.78rem}
.prog .trk{flex:1;height:5px;background:var(--bdr);border-radius:3px;overflow:hidden}
.prog .fl{height:100%;background:var(--a);border-radius:3px;transition:width .4s}
.prog .ct{color:var(--a);font-weight:700;font-family:'JetBrains Mono',monospace}
.sec{margin-bottom:24px;border:1px solid var(--bdr);border-radius:12px;overflow:hidden;background:var(--card)}
.sec-h{padding:14px 18px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;transition:.2s}
.sec-h:hover{background:var(--hover)}
.sec-h .ico{font-size:1.4rem}
.sec-h h2{font-size:1.05rem;color:#fff;font-weight:700;flex:1}
.sec-h .cnt{font-size:.68rem;padding:2px 8px;background:var(--bdr);border-radius:10px;color:var(--td);font-family:'JetBrains Mono',monospace}
.sec-h .chv{color:var(--td);transition:transform .2s;font-size:1rem}
.sec.collapsed .sec-body{display:none}
.sec.collapsed .chv{transform:rotate(-90deg)}
.item{border-top:1px solid var(--bdr);padding:16px 18px;display:grid;grid-template-columns:180px 1fr;gap:12px;transition:.15s}
.item:hover{background:var(--hover)}
.item-l .nm{font-weight:700;font-size:.9rem;color:var(--a);line-height:1.3}
.item-l .ab{font-size:.68rem;color:var(--td);font-family:'JetBrains Mono',monospace;background:rgba(255,255,255,.04);padding:1px 6px;border-radius:3px;display:inline-block;margin-top:3px}
.item-l .mk{margin-top:6px;font-size:.68rem;cursor:pointer;display:flex;align-items:center;gap:4px;color:var(--td);transition:.2s}
.item-l .mk:hover{color:var(--g)}
.item-l .mk.dn{color:var(--g)}
.item-l .mk .ck{width:13px;height:13px;border:1.5px solid currentColor;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:.55rem}
.item-l .mk.dn .ck{background:var(--g);border-color:var(--g);color:#000}
.fb{background:rgba(255,255,255,.03);border-radius:6px;padding:9px 11px;font-size:.82rem;color:var(--t);border-left:3px solid var(--bdr2);margin-bottom:6px}
.mb{border-radius:6px;padding:9px 11px;font-size:.82rem;border-left:3px solid var(--a);background:rgba(245,158,11,.05);margin-bottom:5px}
.mb .l{font-size:.62rem;text-transform:uppercase;letter-spacing:1px;color:var(--a);font-weight:700;margin-bottom:2px}
.mb .x{color:#e8c882}
.mb .x strong{color:var(--a)}
.sb{border-radius:6px;padding:9px 11px;font-size:.82rem;border-left:3px solid var(--b);background:rgba(59,130,246,.05);margin-bottom:5px}
.sb .l{font-size:.62rem;text-transform:uppercase;letter-spacing:1px;color:var(--b);font-weight:700;margin-bottom:2px}
.sb .x{color:#93c5fd}
.exam-tip{border-radius:6px;padding:9px 11px;font-size:.82rem;border-left:3px solid var(--g);background:rgba(34,197,94,.05);margin-bottom:5px}
.exam-tip .l{font-size:.62rem;text-transform:uppercase;letter-spacing:1px;color:var(--g);font-weight:700;margin-bottom:2px}
.exam-tip .x{color:#86efac}
.domain-weight{display:inline-block;padding:2px 8px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:700}
.w30{background:rgba(239,68,68,.15);color:var(--r)}
.w26{background:rgba(59,130,246,.15);color:var(--b)}
.w24{background:rgba(167,139,250,.15);color:var(--p)}
.w20{background:rgba(34,197,94,.15);color:var(--g)}
.quiz-w{display:none;padding:18px 0}
.quiz-w.show{display:block}
.quiz-w h2{color:#fff;font-size:1.2rem}
.quiz-w>p{color:var(--td);font-size:.85rem;margin-top:4px}
.qctrls{display:flex;gap:6px;margin:12px 0;flex-wrap:wrap}
.qctrls button,.qb{padding:7px 18px;border-radius:7px;border:1px solid var(--bdr);background:var(--card);color:var(--t);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:.82rem;transition:.15s}
.qctrls button:hover,.qb:hover{border-color:var(--b);color:var(--b)}
.qb.pri{background:var(--b);color:#fff;border-color:var(--b)}
.qcard{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:18px;margin-bottom:10px}
.qq{font-size:.9rem;color:var(--tb);margin-bottom:10px;font-weight:500}
.qq .qn{color:var(--b);font-family:'JetBrains Mono',monospace;font-weight:700}
.qopts{display:flex;flex-wrap:wrap;gap:7px}
.qopt{padding:6px 14px;border-radius:7px;border:1px solid var(--bdr);background:0;color:var(--t);cursor:pointer;font-size:.8rem;transition:.15s;font-family:'Plus Jakarta Sans',sans-serif}
.qopt:hover{border-color:var(--b)}
.qopt.right{background:rgba(34,197,94,.15);border-color:var(--g);color:var(--g)}
.qopt.wrong{background:rgba(239,68,68,.15);border-color:var(--r);color:var(--r)}
.qscore{text-align:center;padding:18px;font-size:1rem;color:var(--a);font-weight:700}
@media(max-width:700px){.item{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="hero">
<h1>SAA-C03 <span>Complete Exam Memory Palace</span></h1>
<p>Domains, concepts, strategies &amp; all services — with mnemonics for everything</p>
<div class="badge">4 Domains · 14 Task Statements · ~130 Services · Concepts &amp; Strategies</div>
</div>

<div class="search-w"><input type="text" id="search" placeholder="Search anything (services, concepts, DR strategies, encryption...)"></div>

<div class="prog" id="prog"><span style="color:var(--td)">Mastered:</span><div class="trk"><div class="fl" id="pf" style="width:0%"></div></div><span class="ct" id="pc">0/0</span></div>
<div id="content"></div>

<button onclick="startQuiz(25)">25 Questions</button>
<button onclick="startQuiz(50)">50 Questions</button>

<script>
const D=[
// ====== EXAM STRUCTURE ======
{cat:"Exam Structure & Domains",icon:"📋",name:"Exam Overview",abbr:"SAA-C03",
func:"65 questions (50 scored + 15 unscored), 130 minutes, pass = 720/1000. Multiple choice + multiple response. No penalty for guessing — always answer everything.",
mnemonic:"<strong>65 questions, 130 minutes = 2 min/question</strong> — remember: 50 are real, 15 are guinea pigs (unscored). You can't tell which is which, so treat all 65 seriously.",
story:"Picture a classroom with 65 desks. 50 students are real, 15 are spies. You don't know who's who, so you teach everyone equally. The passing grade is 720 out of 1000 — roughly 72%."},

{cat:"Exam Structure & Domains",icon:"📋",name:"Domain 1: Design Secure Architectures",abbr:"30% of exam",
func:"Secure access to AWS resources. Secure workloads and applications. Appropriate data security controls. IAM, encryption, VPC security, federated access.",
mnemonic:"<strong>30% = \"Security is #1\"</strong> — the biggest slice. Remember: <strong>S-E-D</strong> = Secure access, sEcure workloads, Data security. The 3 task statements.",
story:"A castle (your architecture) with 3 layers of defense: the gate (IAM/access), the walls (VPC/WAF/Shield), and the vault (KMS/encryption). 30% of the exam tests these 3 layers."},

{cat:"Exam Structure & Domains",icon:"📋",name:"Domain 2: Design Resilient Architectures",abbr:"26% of exam",
func:"Scalable & loosely coupled architectures. Highly available and fault-tolerant designs. DR strategies, multi-AZ, read replicas, decoupling with SQS/SNS.",
mnemonic:"<strong>26% — \"Resilience is Runner-up\"</strong> — 2nd biggest domain. Two tasks: <strong>S-L-C</strong> (Scalable Loosely Coupled) and <strong>H-A-F-T</strong> (Highly Available Fault Tolerant).",
story:"An elastic rubber band (scalable) connecting two separate puzzle pieces (loosely coupled). Even if one piece breaks (fault), the band stretches to a backup piece (HA/DR)."},

{cat:"Exam Structure & Domains",icon:"📋",name:"Domain 3: Design High-Performing Architectures",abbr:"24% of exam",
func:"High-performing storage, compute, databases, networks, and data ingestion/transformation. Choosing the right service for the right workload.",
mnemonic:"<strong>24% — \"Performance is 3rd Place (bronze)\"</strong> — 5 sub-topics spell <strong>S-C-D-N-I</strong>: Storage, Compute, Database, Network, Ingestion. \"<strong>S</strong>uper <strong>C</strong>ars <strong>D</strong>rive <strong>N</strong>orth <strong>I</strong>nstantly\".",
story:"A Formula 1 race car (high performance). The tires = storage, engine = compute, fuel gauge = database, GPS = networking, pit crew = data ingestion. All must be optimized to win."},

{cat:"Exam Structure & Domains",icon:"📋",name:"Domain 4: Design Cost-Optimized Architectures",abbr:"20% of exam",
func:"Cost-optimized storage, compute, databases, and network solutions. Right-sizing, Savings Plans, Spot Instances, S3 lifecycle, Reserved Instances.",
mnemonic:"<strong>20% — \"Cost is last but not least\"</strong> — 4 sub-topics: <strong>S-C-D-N</strong> again (Storage, Compute, Database, Network) but now through the lens of COST. Same car, cheaper fuel.",
story:"A penny-pinching accountant reviewing every AWS bill with a magnifying glass. \"Why are you using io2 when gp3 would work? Switch to Spot Instances! Use S3 Intelligent-Tiering!\""},

// ====== KEY CONCEPTS ======
{cat:"Key Concepts & Strategies",icon:"🎯",name:"Well-Architected Framework (6 Pillars)",abbr:"WAF",
func:"The 6 pillars: Operational Excellence, Security, Reliability, Performance Efficiency, Cost Optimization, Sustainability.",
mnemonic:"<strong>\"OS Runs Pretty Cool, Sustainably\"</strong> — <strong>O</strong>perational excellence, <strong>S</strong>ecurity, <strong>R</strong>eliability, <strong>P</strong>erformance, <strong>C</strong>ost, <strong>S</strong>ustainability. Or: <strong>OSRPCS</strong>.",
story:"A 6-legged table. Remove any leg (pillar) and the table wobbles. All 6 must be balanced for a well-architected solution."},

{cat:"Key Concepts & Strategies",icon:"🎯",name:"Shared Responsibility Model",abbr:"SRM",
func:"AWS manages security OF the cloud (hardware, regions, AZs, facilities). You manage security IN the cloud (data, IAM, encryption, OS patching, firewall rules).",
mnemonic:"<strong>\"AWS = building landlord. You = tenant.\"</strong> — The landlord (AWS) secures the building (infrastructure). You secure your apartment (data, keys, who gets in).",
story:"AWS builds the bank vault (physical security, networking). You choose the combination (encryption keys), who gets a key (IAM), and what you put inside (data). Both share responsibility."},

{cat:"Key Concepts & Strategies",icon:"🎯",name:"DR Strategies (Cost vs Speed)",abbr:"DR",
func:"From cheapest/slowest to most expensive/fastest: Backup & Restore → Pilot Light → Warm Standby → Multi-site Active/Active.",
mnemonic:"<strong>\"B-P-W-M\" = \"Backup, Pilot, Warm, Multi\"</strong> — think of heating a house: Backup = fireplace (slow, cheap), Pilot = pilot light on furnace (ready but small), Warm = furnace running low, Multi = full blast heating everywhere.",
story:"4 levels of readiness: (1) Cold storage — everything is off, restore from backups (hours). (2) Pilot light — a tiny flame keeps core running (minutes). (3) Warm standby — scaled-down but functional clone (seconds). (4) Active/active — both sites fully running, instant failover."},

{cat:"Key Concepts & Strategies",icon:"🎯",name:"RPO and RTO",abbr:"RPO/RTO",
func:"RPO (Recovery Point Objective) = max acceptable data loss (time). RTO (Recovery Time Objective) = max acceptable downtime. Lower values = more expensive.",
mnemonic:"<strong>RPO = how much data can you LOSE? RTO = how long can you be DOWN?</strong> — RPO looks backward (data loss), RTO looks forward (recovery time).",
story:"RPO: \"I can afford to lose the last 1 hour of data\" = RPO of 1 hour. RTO: \"The system must be back online within 15 minutes\" = RTO of 15 min. Tighter = costlier."},

{cat:"Key Concepts & Strategies",icon:"🎯",name:"Horizontal vs Vertical Scaling",abbr:"Scaling",
func:"Vertical = bigger machine (scale UP, limited). Horizontal = more machines (scale OUT, unlimited). Horizontal preferred for resilience.",
mnemonic:"<strong>Vertical = making the elevator bigger. Horizontal = adding more elevators.</strong> — There's a limit to how big one elevator can get. But you can always add another elevator.",
story:"A restaurant analogy: vertical scaling = hire a chef who cooks 10x faster (limits). Horizontal scaling = hire 10 chefs (unlimited). If one chef is sick, 9 others keep cooking (resilience)."},

{cat:"Key Concepts & Strategies",icon:"🎯",name:"Loose Coupling & Decoupling",abbr:"Decouple",
func:"Components shouldn't depend directly on each other. Use SQS, SNS, EventBridge, or API Gateway as middlemen. If one fails, others continue.",
mnemonic:"<strong>\"Don't hold hands — use walkie-talkies\"</strong> — Tightly coupled = two people holding hands (one falls, both fall). Loosely coupled = walkie-talkies (one falls, the other keeps going).",
story:"Instead of Server A calling Server B directly (if B crashes, A crashes too), put an SQS queue between them. A drops messages in the queue. B picks them up when ready. If B is down, messages wait safely."},

{cat:"Key Concepts & Strategies",icon:"🎯",name:"EC2 Pricing Models",abbr:"EC2 Pricing",
func:"On-Demand (pay per second/hour), Reserved Instances (1-3yr commitment, up to 72% off), Savings Plans (flexible commitment), Spot (up to 90% off, can be interrupted), Dedicated Hosts (physical server).",
mnemonic:"<strong>\"O-R-S-S-D\" = \"On-demand Restaurant, Reserved Seat, Savings Subscription, Spot auction, Dedicated dining room\"</strong>",
story:"On-Demand = walk-in restaurant (expensive). Reserved = annual membership (cheaper). Savings Plans = flexible meal plan. Spot = last-minute auction for empty tables (cheapest, but they can kick you out). Dedicated = rent the whole restaurant."},

{cat:"Key Concepts & Strategies",icon:"🎯",name:"S3 Storage Classes",abbr:"S3 Tiers",
func:"Standard → Intelligent-Tiering → Standard-IA → One Zone-IA → Glacier Instant → Glacier Flexible → Glacier Deep Archive. Cost decreases, retrieval time increases.",
mnemonic:"<strong>\"SIT on a SOFA in a Glacier\" — S</strong>tandard, <strong>I</strong>ntelligent-<strong>T</strong>iering, Standard-IA (<strong>S</strong>ofa), <strong>O</strong>ne Zone-IA, Glacier Instant (<strong>F</strong>ast ice), Glacier Flexible (<strong>A</strong>rctic), Deep Archive.",
story:"A 7-floor building. Top floor (Standard) = penthouse, expensive, instant access. Each floor down is cheaper but harder to reach. Basement (Deep Archive) = cheapest rent, 12-48 hours to get your stuff back."},

{cat:"Key Concepts & Strategies",icon:"🎯",name:"EBS Volume Types",abbr:"EBS Types",
func:"gp3/gp2 (General Purpose SSD), io2/io1 (Provisioned IOPS SSD, for databases), st1 (Throughput HDD, big data), sc1 (Cold HDD, infrequent).",
mnemonic:"<strong>\"GP for General, IO for Intense, ST for Streaming Throughput, SC for Super Cold\"</strong> — gp3 = everyday use. io2 = high IOPS databases. st1 = sequential big data. sc1 = cheapest, archive.",
story:"4 car gears: gp3 = cruise control (general). io2 = race mode (high IOPS). st1 = highway lane (high throughput). sc1 = parking (cold, minimal access)."},

{cat:"Key Concepts & Strategies",icon:"🎯",name:"VPC Security: SG vs NACL",abbr:"SG vs NACL",
func:"Security Groups: stateful, instance-level, allow rules only, default deny. NACLs: stateless, subnet-level, allow AND deny rules, processed in order.",
mnemonic:"<strong>\"SG = Smart Guard (remembers). NACL = Numbered Access Control List (checks every time).\"</strong>",
story:"Security Group = a smart bouncer at each room door. If he lets you IN, he remembers and lets you OUT automatically (stateful). NACL = a checklist guard at the building entrance. Checks both entry AND exit separately (stateless). Rules processed by number."},

{cat:"Key Concepts & Strategies",icon:"🎯",name:"Public vs Private Subnets",abbr:"Subnets",
func:"Public subnet: has a route to Internet Gateway (IGW). Private subnet: no direct internet route. Use NAT Gateway for private instances to reach internet.",
mnemonic:"<strong>\"Public = front yard (faces the street). Private = backyard (fenced, needs a gate to go out).\"</strong>",
story:"Web servers go in the front yard (public subnet, internet-facing). Databases hide in the backyard (private subnet). If the database needs to download updates, it uses the side gate (NAT Gateway) — it can go out, but nobody from outside can come in."},

{cat:"Key Concepts & Strategies",icon:"🎯",name:"Route 53 Routing Policies",abbr:"R53 Routing",
func:"Simple, Weighted, Latency-based, Failover, Geolocation, Geoproximity, Multi-value answer.",
mnemonic:"<strong>\"S-W-L-F-G-G-M\" = \"Smart Waiters Love Feeding Guests Great Meals\"</strong>",
story:"Simple = one answer. Weighted = 70% here, 30% there. Latency = fastest route. Failover = primary fails → secondary. Geolocation = EU users → EU server. Geoproximity = bias toward certain regions. Multi-value = multiple healthy answers."},

{cat:"Key Concepts & Strategies",icon:"🎯",name:"Encryption: At Rest vs In Transit",abbr:"Encryption",
func:"At rest: KMS, SSE-S3, SSE-KMS, SSE-C, EBS encryption. In transit: TLS/SSL, ACM certificates, HTTPS. Always encrypt both.",
mnemonic:"<strong>\"At rest = locked safe (KMS). In transit = armored truck (TLS).\"</strong>",
story:"Data sitting in S3 = sleeping in a hotel room. Lock the door (encryption at rest with KMS). Data traveling between services = riding in a car. Use an armored truck (TLS/HTTPS) so nobody can peek inside."},

{cat:"Key Concepts & Strategies",icon:"🎯",name:"Multi-AZ vs Read Replicas",abbr:"AZ vs Replica",
func:"Multi-AZ: synchronous standby in another AZ for HIGH AVAILABILITY (failover). Read Replicas: async copies for READ PERFORMANCE (scale reads). Different purposes!",
mnemonic:"<strong>Multi-AZ = spare tire (HA). Read Replica = extra lanes on the highway (performance).</strong>",
story:"Multi-AZ: a backup goalkeeper sitting on the bench. If the main goalie is injured, the backup jumps in instantly (failover). Read Replicas: adding more checkout lanes at the supermarket. More lanes = more customers served (read throughput). But they're not a failover solution."},

{cat:"Key Concepts & Strategies",icon:"🎯",name:"Stateless vs Stateful Workloads",abbr:"State",
func:"Stateless: no session data stored locally (use DynamoDB/ElastiCache for sessions). Ideal for horizontal scaling. Stateful: stores data locally, harder to scale.",
mnemonic:"<strong>\"Stateless = any waiter can serve you. Stateful = only YOUR waiter knows your order.\"</strong>",
story:"Stateless restaurant: your order is written on a shared screen. Any waiter can serve you. You can add/remove waiters freely (auto scaling). Stateful restaurant: your waiter memorizes your order. If they leave, your order is lost."},

{cat:"Key Concepts & Strategies",icon:"🎯",name:"Caching Strategy",abbr:"Caching",
func:"CloudFront (edge caching), ElastiCache (in-memory DB caching: Redis/Memcached), DAX (DynamoDB-specific cache). Reduces latency and DB load.",
mnemonic:"<strong>\"3 levels of caching: Edge → App → DB\"</strong> — CloudFront caches at the edge (CDN). ElastiCache caches at the app layer. DAX caches DynamoDB specifically.",
story:"A library system: CloudFront = branch libraries near your house (edge). ElastiCache = librarian's desk with popular books ready (app-level). DAX = a specific shelf pre-loaded with DynamoDB's most-requested items."},

{cat:"Key Concepts & Strategies",icon:"🎯",name:"Load Balancer Types",abbr:"ALB/NLB/GLB",
func:"ALB: Layer 7 (HTTP/HTTPS), path/host routing. NLB: Layer 4 (TCP/UDP), ultra-fast, static IPs. GLB: Layer 3, for third-party firewalls. CLB: legacy.",
mnemonic:"<strong>ALB = Application (smart, HTTP). NLB = Network (fast, TCP). GLB = Gateway (firewalls). CLB = Classic (legacy, avoid).</strong>",
story:"ALB = a smart receptionist who reads your request and routes you to the right department (path-based routing). NLB = a highway toll booth — ultra-fast, doesn't read content, just forwards packets. GLB = a security checkpoint routing traffic through third-party inspection appliances."},

// ====== ANALYTICS ======
{cat:"Analytics",icon:"📊",name:"Amazon Athena",abbr:"Athena",func:"Serverless SQL queries on S3 data. No infrastructure. Pay per query.",mnemonic:"<strong>Athena = goddess who answers questions</strong> — asks S3 a SQL question, gets an answer. No servers."},
{cat:"Analytics",icon:"📊",name:"AWS Data Exchange",abbr:"Data Exchange",func:"Marketplace for subscribing to third-party data sets.",mnemonic:"<strong>Data Farmers' Market</strong> — browse stalls, subscribe, get fresh data delivered to S3."},
{cat:"Analytics",icon:"📊",name:"AWS Data Pipeline",abbr:"Data Pipeline",func:"Orchestrates data movement and transformation between AWS/on-prem.",mnemonic:"<strong>Oil Pipeline for Data</strong> — crude data flows in, processed at stations, clean data out."},

// ======== BUILD ========
const cats=[...new Set(D.map(d=>d.cat))];
const M=new Set(JSON.parse(localStorage.getItem('saa2_m')||'[]'));
function sM(){localStorage.setItem('saa2_m',JSON.stringify([...M]));uP()}
function uP(){const t=D.length,d=M.size;document.getElementById('pf').style.width=(d/t*100)+'%';document.getElementById('pc').textContent=d+'/'+t}
function bN(){const n=document.getElementById('nav');n.innerHTML='<button class="on" data-f="all">All ('+D.length+')</button>';cats.forEach(c=>{const l=D.filter(d=>d.cat===c).length;n.innerHTML+='<button data-f="'+c+'">'+c+' ('+l+')</button>'});n.innerHTML+='<button data-f="quiz">🧪 Quiz</button>';n.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{n.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');fV(b.dataset.f)}))}
function bC(){const el=document.getElementById('content');let h='';cats.forEach(cat=>{const svcs=D.filter(d=>d.cat===cat);const ico=svcs[0]?.icon||'📁';h+='<div class="sec" data-cat="'+cat+'"><div class="sec-h" onclick="this.parentElement.classList.toggle(\'collapsed\')"><span class="ico">'+ico+'</span><h2>'+cat+'</h2><span class="cnt">'+svcs.length+'</span><span class="chv">▾</span></div><div class="sec-body">';svcs.forEach(s=>{const id=s.abbr.replace(/[^a-zA-Z0-9]/g,'_');const dn=M.has(id);h+='<div class="item" data-search="'+(s.name+' '+s.abbr+' '+s.func+' '+(s.mnemonic||'')+' '+s.cat).toLowerCase().replace(/<[^>]*>/g,'')+'" data-cat="'+cat+'"><div class="item-l"><div class="nm">'+s.name+'</div><div class="ab">'+s.abbr+'</div><div class="mk '+(dn?'dn':'')+'" data-id="'+id+'" onclick="tM(this)"><span class="ck">'+(dn?'✓':'')+'</span> '+(dn?'Mastered':'Mark learned')+'</div></div><div class="item-r"><div class="fb">'+s.func+'</div><div class="mb"><div class="l">🔗 Mnemonic</div><div class="x">'+s.mnemonic+'</div></div>'+(s.story?'<div class="sb"><div class="l">📖 Visual Story</div><div class="x">'+s.story+'</div></div>':'')+'</div></div>'});h+='</div></div>'});el.innerHTML=h}
function tM(el){const id=el.dataset.id;if(M.has(id)){M.delete(id);el.classList.remove('dn');el.querySelector('.ck').textContent='';el.childNodes[1].textContent=' Mark learned'}else{M.add(id);el.classList.add('dn');el.querySelector('.ck').textContent='✓';el.childNodes[1].textContent=' Mastered'}sM()}
function fV(f){const c=document.getElementById('content'),q=document.getElementById('qw'),s=document.querySelector('.search-w'),p=document.getElementById('prog');if(f==='quiz'){c.style.display='none';q.classList.add('show');s.style.display='none';p.style.display='none';return}c.style.display='';q.classList.remove('show');s.style.display='';p.style.display='';document.querySelectorAll('.sec').forEach(s=>{s.style.display=(f==='all'||s.dataset.cat===f)?'':'none'})}
document.getElementById('search').addEventListener('input',function(){const q=this.value.toLowerCase().trim();document.querySelectorAll('.item').forEach(s=>{s.style.display=(!q||s.dataset.search.includes(q))?'':'none'});document.querySelectorAll('.sec').forEach(cat=>{const any=[...cat.querySelectorAll('.item')].some(s=>s.style.display!=='none');cat.style.display=any?'':'none'})});

// ======== QUIZ ========
function sh(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function startQuiz(n){const ar=document.getElementById('qa');const pool=sh([...D]).slice(0,n);let html='';pool.forEach((item,i)=>{const wr=sh(D.filter(d=>d.name!==item.name)).slice(0,3).map(d=>d.name);const opts=sh([item.name,...wr]);html+='<div class="qcard" id="qc-'+i+'"><div class="qq"><span class="qn">'+(i+1)+'.</span> '+item.func+'</div><div class="qopts">'+opts.map(o=>'<button class="qopt" data-correct="'+(o===item.name)+'" onclick="cQ(this,'+i+','+n+')">'+o+'</button>').join('')+'</div></div>'});html+='<div class="qscore" id="qs" style="display:none"></div><div style="text-align:center;margin-top:8px"><button class="qb pri" onclick="startQuiz('+n+')" style="display:none" id="qr">Try Again</button></div>';ar.innerHTML=html;window._qs={s:0,a:0,t:n}}
function cQ(btn,i,t){const c=document.getElementById('qc-'+i);if(c.dataset.done)return;c.dataset.done='1';const ok=btn.dataset.correct==='true';if(ok){btn.classList.add('right');window._qs.s++}else{btn.classList.add('wrong');c.querySelectorAll('.qopt').forEach(o=>{if(o.dataset.correct==='true')o.classList.add('right')})}window._qs.a++;if(window._qs.a===window._qs.t){const s=window._qs.s,p=Math.round(s/t*100),m=p===100?'🎉 Perfect!':p>=80?'👍 Great!':p>=60?'📖 Getting there!':'📚 Keep studying!';document.getElementById('qs').style.display='';document.getElementById('qs').textContent=s+'/'+t+' ('+p+'%) — '+m;document.getElementById('qr').style.display=''}}
bN();bC();uP();
</script>
